<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shift Scheduler</title>
<style>
:root{--bg:#f6f7f4;--panel:#fff;--ink:#1f2933;--muted:#667085;--line:#d9ded6;--accent:#315c49;--accent2:#e8f1ea;--bad:#8c2f39;--warn:#8a4b18;}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{padding:18px 20px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5} h1{margin:0;font-size:22px} small{color:var(--muted)}
button,input,select,textarea{font:inherit} button{border:1px solid var(--accent);background:var(--accent);color:#fff;padding:8px 11px;border-radius:8px;cursor:pointer} button.secondary{background:#fff;color:var(--accent)} button.danger{background:#fff;color:var(--bad);border-color:var(--bad)} button.warn{background:#fff;color:var(--warn);border-color:var(--warn)} button:disabled{opacity:.45;cursor:not-allowed}
nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px} nav button{background:#fff;color:var(--accent)} nav button.active{background:var(--accent);color:#fff}
main{padding:20px;max-width:1400px;margin:auto}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.grid{display:grid;gap:12px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
label{display:flex;flex-direction:column;gap:5px;font-weight:600;font-size:13px} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;background:#fff;color:var(--ink)} textarea{min-height:70px;resize:vertical}
table{width:100%;border-collapse:collapse;background:#fff} th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top} th{background:var(--accent2);font-size:12px;text-transform:uppercase;letter-spacing:.03em} td input,td select{min-width:100px}
.row-actions,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar{margin-bottom:12px}.hidden{display:none!important}.notice{color:var(--muted);font-size:13px;line-height:1.4}.status-pill{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--accent2);font-size:12px}.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:14px}.export-block{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;background:#f9faf8;border:1px solid var(--line);border-radius:10px;padding:12px;min-height:145px}.top-overview{margin-bottom:16px}.calendar-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}.calendar-table{min-width:760px;font-size:13px}.calendar-table th:first-child,.calendar-table td:first-child{position:sticky;left:0;background:#fff;z-index:1}.calendar-table th:first-child{background:var(--accent2)}.calendar-cell{line-height:1.25;white-space:normal}.calendar-cell strong{display:block;font-size:12px}.compact-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:end}.mobile-card-note{display:none}.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.kpi div{background:var(--accent2);border-radius:10px;padding:10px}.kpi strong{display:block;font-size:22px} a.action{display:inline-block;text-decoration:none;border:1px solid var(--accent);color:#fff;background:var(--accent);padding:8px 11px;border-radius:8px}.subtle{background:#f9faf8;border:1px dashed var(--line);padding:10px;border-radius:10px}.log-list{max-height:300px;overflow:auto;border:1px solid var(--line);border-radius:10px}.log-list table{margin:0}
.header-inner{display:flex;align-items:center;gap:12px}.brand-logo{width:52px;height:52px;border-radius:12px;object-fit:cover;border:1px solid var(--line);background:var(--accent2);display:none}.brand-logo.show{display:block}.brand-text{min-width:0}.swatch{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);display:inline-block;vertical-align:middle}.schedule-row{border-left:7px solid transparent}.schedule-row.off-row{background:#fff6f6!important;border-left-color:#c2414b}.schedule-row.scheduled-row{background:color-mix(in srgb,var(--row-color,#e8f1ea) 18%,#fff);border-left-color:var(--row-color,#315c49)}.calendar-cell{padding:7px;border-radius:9px;border-left:5px solid transparent}.calendar-cell.scheduled-cell{background:color-mix(in srgb,var(--cell-color,#e8f1ea) 22%,#fff);border-left-color:var(--cell-color,#315c49)}.calendar-cell.off-cell{background:#fff0f1;border-left-color:#c2414b}.inline-undo{padding:6px 9px;font-size:12px}.logo-preview{display:flex;align-items:center;gap:10px}.logo-preview img{width:56px;height:56px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}input[type=color]{padding:3px;min-width:54px;height:40px}
@media(max-width:800px){.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr} table{display:block;overflow-x:auto} header{position:static;padding:14px} main{padding:12px} h1{font-size:20px}.panel{padding:12px;border-radius:12px}.card-grid{grid-template-columns:1fr}.toolbar button,.toolbar a.action,.row-actions button,.row-actions a.action{width:100%;text-align:center}.schedule-table,.schedule-table thead,.schedule-table tbody,.schedule-table tr,.schedule-table td,.schedule-table th{display:block;width:100%}.schedule-table thead{display:none}.schedule-table tr{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:10px;background:#fff}.schedule-table td{border-bottom:0;padding:6px 0}.schedule-table td::before{content:attr(data-label);display:block;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:3px;font-weight:700}.schedule-table td:first-child::before{display:none}.mobile-card-note{display:block;color:var(--muted);font-size:13px;margin:8px 0 0}}
</style>
</head>
<body>
<header>
<div class="header-inner"><img id="headerLogo" class="brand-logo" alt="Business Logo"><div class="brand-text"><h1 id="headerTitle">Shift Scheduler</h1>
<small>Self-contained local scheduler. Data autosaves in this browser; export/import JSON for portable local saves.</small></div></div>
<nav>
<button data-tab="setup" class="active">Setup</button>
<button data-tab="schedule">Schedule</button>
<button data-tab="export">Export</button>
<button data-tab="log">Schedule Log</button>
<button data-tab="data">Save / Load</button>
</nav>
</header>
<main>
<section id="topOverview" class="panel top-overview"></section>
<section id="setup" class="tab panel"></section>
<section id="schedule" class="tab hidden"></section>
<section id="export" class="tab panel hidden"></section>
<section id="log" class="tab panel hidden"></section>
<section id="data" class="tab panel hidden"></section>
</main>
<script>
const SEED={"businessName":"The Fat Shallot","businessLogo":"","weekStart":"Monday","startDate":"2026-04-27","locations":[{"name":"U of C","code":"UC","notes":"5801 S Ellis Ave","color":"#315c49"},{"name":"Commissary","code":"Comm/Prep","notes":"2300 S Throop St (Dock 46)","color":"#7c3aed"},{"name":"Catering","code":"CAT","notes":"","color":"#2563eb"},{"name":"Event","code":"EVT","notes":"","color":"#d97706"}],"staff":[{"name":"Edwin Franco","role":"Staff","primaryLocation":"U of C","secondaryLocation":"","email":"evf@edwinvfranco.com","phone":"3126969367","defaultStart":"","defaultEnd":"","notes":"U of C","active":true},{"name":"James","role":"Manager","primaryLocation":"U of C","secondaryLocation":"","email":"james@email.com","phone":"5551234002","defaultStart":"","defaultEnd":"","notes":"U of C","active":true},{"name":"Alex","role":"Manager","primaryLocation":"U of C","secondaryLocation":"","email":"alex@email.com","phone":"5551234003","defaultStart":"","defaultEnd":"","notes":"U of C","active":true}],"schedules":{"Edwin Franco":[{"date":"2026-04-27","day":"MON","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-04-28","day":"TUE","location":"U of C","start":"08:00","end":"","status":"Scheduled","notes":""},{"date":"2026-04-29","day":"WED","location":"U of C","start":"08:00","end":"","status":"Scheduled","notes":""},{"date":"2026-04-30","day":"THU","location":"U of C","start":"10:00","end":"","status":"Scheduled","notes":""},{"date":"2026-05-01","day":"FRI","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-05-02","day":"SAT","location":"Catering","start":"11:00","end":"20:30","status":"Scheduled","notes":"James Off"},{"date":"2026-05-03","day":"SUN","location":"","start":"","end":"","status":"Off","notes":""}],"James":[{"date":"2026-04-27","day":"MON","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-04-28","day":"TUE","location":"U of C","start":"08:00","end":"","status":"Scheduled","notes":""},{"date":"2026-04-29","day":"WED","location":"U of C","start":"08:00","end":"","status":"Scheduled","notes":""},{"date":"2026-04-30","day":"THU","location":"U of C","start":"10:00","end":"","status":"Scheduled","notes":""},{"date":"2026-05-01","day":"FRI","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-05-02","day":"SAT","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-05-03","day":"SUN","location":"","start":"","end":"","status":"Off","notes":""}],"Alex":[{"date":"2026-04-27","day":"MON","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-04-28","day":"TUE","location":"U of C","start":"08:00","end":"","status":"Scheduled","notes":""},{"date":"2026-04-29","day":"WED","location":"U of C","start":"08:00","end":"","status":"Scheduled","notes":""},{"date":"2026-04-30","day":"THU","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-05-01","day":"FRI","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-05-02","day":"SAT","location":"","start":"","end":"","status":"Off","notes":""},{"date":"2026-05-03","day":"SUN","location":"","start":"","end":"","status":"Off","notes":""}]},"logs":[]};
const DAYS3=["MON","TUE","WED","THU","FRI","SAT","SUN"],STATUS=["Scheduled","Off","Vacation","Sick","Holiday","Unavailable"],STORE_KEY="shiftScheduler.selfContained.v2";
let state=loadState(),scheduleFilterEmployee="",scheduleFilterLocation="",undoStack=[],lineUndo={};
migrateState();
function clone(x){return JSON.parse(JSON.stringify(x));}
function loadState(){try{const saved=localStorage.getItem(STORE_KEY)||localStorage.getItem("shiftScheduler.selfContained.v1");if(saved){const s=JSON.parse(saved);if(!s.logs)s.logs=[];return s}}catch(e){}return clone(SEED)}
function migrateState(){if(!state.businessLogo)state.businessLogo="";const defaults=["#315c49","#7c3aed","#2563eb","#d97706","#059669","#dc2626","#0891b2"];(state.locations||[]).forEach((l,i)=>{if(!l.color)l.color=defaults[i%defaults.length]});}
function locationColor(name){const l=(state.locations||[]).find(x=>x.name===name);return l?.color||"#315c49";}
function dayClass(d){return d.status==="Scheduled"?"scheduled-row":"off-row";}
function dayCellClass(d){return d.status==="Scheduled"?"scheduled-cell":"off-cell";}
function lineKey(name,di){return encodeURIComponent(name)+"__"+di;}
function pushLineUndo(name,di,day){lineUndo[lineKey(name,di)]=clone(day);}
function restoreLineUndo(name,di){const key=lineKey(name,di),old=lineUndo[key];if(!old)return;pushUndo("Undo row");state.schedules[name][di]=old;delete lineUndo[key];saveState();render();}
function updateHeader(){const logo=document.getElementById("headerLogo"),title=document.getElementById("headerTitle");if(title)title.textContent=state.businessName||"Shift Scheduler";if(logo){if(state.businessLogo){logo.src=state.businessLogo;logo.classList.add("show")}else{logo.removeAttribute("src");logo.classList.remove("show")}}}
function pushUndo(label="Change"){undoStack.push({label,time:new Date().toISOString(),state:clone(state)});if(undoStack.length>25)undoStack.shift();renderUndoButton();}
function undoLast(){const last=undoStack.pop();if(!last){alert("Nothing to undo.");return}state=last.state;saveState(false);render();}
function saveState(mark=true){if(mark)state.updatedAt=new Date().toISOString();localStorage.setItem(STORE_KEY,JSON.stringify(state));}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function firstName(name){return String(name||"").trim().split(/\s+/)[0]||"";}
function dateAdd(iso,days){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
function mdy(iso){if(!iso)return"";const[y,m,d]=iso.split("-").map(Number);return m+"/"+d}
function time12(t,withAmPm=true){if(!t||t==="Off")return t||"";const m=String(t).match(/^(\d{1,2}):(\d{2})/);if(!m)return t;let h=+m[1],min=m[2];const ap=h>=12?"PM":"AM";h=h%12||12;return h+":"+min+(withAmPm?ap:"")}
function timeRange(start,end){if(!start||start==="Off")return"";return end?time12(start,false)+"-"+time12(end,true):time12(start,true)}
function dayForIndex(i){return DAYS3[i]} function locationsList(){return state.locations.map(l=>l.name).filter(Boolean)} function activeStaff(){return state.staff.filter(s=>s.name&&s.active!==false)}
function ensureSchedule(name){if(!state.schedules)state.schedules={};if(!state.schedules[name])state.schedules[name]=Array.from({length:7},(_,i)=>({date:dateAdd(state.startDate,i),day:DAYS3[i],location:"",start:"",end:"",status:"Off",notes:""}));state.schedules[name].forEach((d,i)=>{d.date=dateAdd(state.startDate,i);d.day=DAYS3[i];if(d.start==="Off")d.start="";if(d.status==="Off")clearOffFields(d);});return state.schedules[name]}
function syncAllSchedules(){activeStaff().forEach(s=>ensureSchedule(s.name))}
function clearOffFields(day){day.start="";day.end="";day.location="";day.notes="";day.status="Off";}
function normalizeDay(day){if(day.status==="Off"){clearOffFields(day);return}if(day.start){day.status="Scheduled"}else{clearOffFields(day)}}
function buildTextForEmployee(staff,locationFilter=""){const days=ensureSchedule(staff.name);let lines=[firstName(staff.name)];days.forEach((d,i)=>{if(locationFilter&&d.location!==locationFilter)return;const status=d.status||(d.start?"Scheduled":"Off");const main=status==="Scheduled"?(timeRange(d.start,d.end)||"Scheduled"):(status||"[no entry]");lines.push(`${dayForIndex(i)} ${mdy(d.date)} ${main}${d.location?" "+d.location:""}${d.notes?" "+d.notes:""}`)});return lines.join("\n")+"\n"}
function buildAllText(){return activeStaff().map(s=>buildTextForEmployee(s)).join("\n")}
function scheduleSummary(d){const status=d.status||(d.start?"Scheduled":"Off");const main=status==="Scheduled"?(timeRange(d.start,d.end)||"Scheduled"):(status||"Off");return `${main}${d.location?" "+d.location:""}${d.notes?" "+d.notes:""}`.trim()}
function encodedBody(txt){return txt.replace(/\r/g,"").replace(/\n/g,"%0A").replace(/&/g,"%26").slice(0,1000)}
function input(value,attrs=""){return `<input value="${esc(value)}" ${attrs}>`} function select(value,options,attrs=""){return `<select ${attrs}>${options.map(o=>`<option value="${esc(o)}" ${String(value)===String(o)?"selected":""}>${esc(o)}</option>`).join("")}</select>`}
function render(){migrateState();syncAllSchedules();updateHeader();renderTopOverview();renderSetup();renderSchedule();renderExport();renderLog();renderData();renderUndoButton()}
function renderUndoButton(){const btn=document.getElementById("undoBtn");if(btn){btn.disabled=!undoStack.length;btn.textContent=undoStack.length?`Undo: ${undoStack[undoStack.length-1].label}`:"Undo"}}
function renderTopOverview(){const rows=activeStaff().map(s=>`<tr><td><strong>${esc(firstName(s.name))}</strong></td>${ensureSchedule(s.name).map((d,i)=>`<td><div class="calendar-cell ${dayCellClass(d)}" style="--cell-color:${esc(locationColor(d.location))}"><strong>${dayForIndex(i)} ${mdy(d.date)}</strong>${esc(scheduleSummary(d))}</div></td>`).join("")}</tr>`).join("");document.getElementById("topOverview").innerHTML=`<div class="toolbar" style="justify-content:space-between;margin-bottom:8px"><div><strong>Current Week Snapshot</strong><br><small>${esc(state.businessName||"Schedule")} · Week of ${esc(mdy(state.startDate))}</small></div><div class="row-actions"><button class="secondary" id="undoBtn">Undo</button><button class="secondary" id="jumpSchedule">Edit Schedule</button></div></div><div class="calendar-wrap"><table class="calendar-table"><thead><tr><th>Worker</th>${DAYS3.map((d,i)=>`<th>${d}<br><small>${mdy(dateAdd(state.startDate,i))}</small></th>`).join("")}</tr></thead><tbody>${rows||`<tr><td colspan="8">No active staff.</td></tr>`}</tbody></table></div>`;document.getElementById("jumpSchedule").onclick=()=>showTab("schedule");document.getElementById("undoBtn").onclick=undoLast;renderUndoButton()}
function staffTable(){return `<h3>Staff</h3><div class="toolbar"><button id="addStaff">Add Staff</button></div><table><thead><tr><th>Active</th><th>Name</th><th>Role</th><th>Primary Location</th><th>Email</th><th>Phone</th><th>Notes</th><th></th></tr></thead><tbody>${state.staff.map((s,i)=>`<tr><td><input type="checkbox" ${s.active!==false?"checked":""} data-staff="${i}" data-field="active"></td><td>${input(s.name,`data-staff="${i}" data-field="name"`)}</td><td>${input(s.role,`data-staff="${i}" data-field="role"`)}</td><td>${select(s.primaryLocation,["",...locationsList()],`data-staff="${i}" data-field="primaryLocation"`)}</td><td>${input(s.email,`data-staff="${i}" data-field="email"`)}</td><td>${input(s.phone,`data-staff="${i}" data-field="phone"`)}</td><td>${input(s.notes,`data-staff="${i}" data-field="notes"`)}</td><td><button class="danger" data-del-staff="${i}">Remove</button></td></tr>`).join("")}</tbody></table>`}
function renderSetup(){document.getElementById("setup").innerHTML=`<h2>Setup</h2><div class="grid cols-3"><label>Business Logo <input id="businessLogoFile" type="file" accept="image/*"></label><div class="logo-preview">${state.businessLogo?`<img src="${esc(state.businessLogo)}" alt="Logo">`:`<span class="swatch"></span>`}<button class="secondary" id="clearLogo" type="button">Clear Logo</button></div><label>Business Name <input id="businessName" value="${esc(state.businessName)}"></label><label>Schedule Start Date <input id="startDate" type="date" value="${esc(state.startDate)}"></label><label>Week Starts On ${select(state.weekStart,["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],'id="weekStart"')}</label></div><h3>Locations</h3><div class="toolbar"><button id="addLocation">Add Location</button></div><table><thead><tr><th>Color</th><th>Name</th><th>Short Code</th><th>Address / Notes</th><th></th></tr></thead><tbody>${state.locations.map((l,i)=>`<tr><td><input type="color" value="${esc(l.color||'#315c49')}" data-loc="${i}" data-field="color"></td><td>${input(l.name,`data-loc="${i}" data-field="name"`)}</td><td>${input(l.code,`data-loc="${i}" data-field="code"`)}</td><td>${input(l.notes,`data-loc="${i}" data-field="notes"`)}</td><td><button class="danger" data-del-loc="${i}">Remove</button></td></tr>`).join("")}</tbody></table>${staffTable()}`;document.getElementById("businessName").oninput=e=>{state.businessName=e.target.value;saveState();updateHeader();renderTopOverview()};document.getElementById("businessLogoFile").onchange=e=>{const file=e.target.files&&e.target.files[0];if(!file)return;pushUndo("Change logo");const reader=new FileReader();reader.onload=()=>{state.businessLogo=reader.result;saveState();render()};reader.readAsDataURL(file)};document.getElementById("clearLogo").onclick=()=>{pushUndo("Clear logo");state.businessLogo="";saveState();render()};document.getElementById("startDate").onchange=e=>{pushUndo("Change week start");state.startDate=e.target.value;Object.values(state.schedules||{}).forEach(days=>days.forEach((d,i)=>{d.date=dateAdd(state.startDate,i);d.day=DAYS3[i]}));saveState();render()};document.getElementById("weekStart").onchange=e=>{pushUndo("Change setup");state.weekStart=e.target.value;saveState()};document.getElementById("addLocation").onclick=()=>{pushUndo("Add location");state.locations.push({name:"",code:"",notes:"",color:"#315c49"});saveState();render()};document.querySelectorAll("[data-loc]").forEach(el=>el.onchange=e=>{pushUndo("Edit location");state.locations[+el.dataset.loc][el.dataset.field]=e.target.value;saveState();render()});document.querySelectorAll("[data-del-loc]").forEach(el=>el.onclick=()=>{pushUndo("Remove location");state.locations.splice(+el.dataset.delLoc,1);saveState();render()});document.getElementById("addStaff").onclick=()=>{pushUndo("Add staff");state.staff.push({name:"New Employee",role:"",primaryLocation:"",secondaryLocation:"",email:"",phone:"",defaultStart:"",defaultEnd:"",notes:"",active:true});saveState();render()};document.querySelectorAll("[data-staff]").forEach(el=>el.onchange=e=>{pushUndo("Edit staff");const oldName=state.staff[+el.dataset.staff].name,field=el.dataset.field;state.staff[+el.dataset.staff][field]=el.type==="checkbox"?el.checked:e.target.value;if(field==="name"&&oldName&&state.schedules[oldName]){state.schedules[e.target.value]=state.schedules[oldName];delete state.schedules[oldName]}saveState();render()});document.querySelectorAll("[data-del-staff]").forEach(el=>el.onclick=()=>{pushUndo("Remove staff");const s=state.staff[+el.dataset.delStaff];if(s?.name)delete state.schedules[s.name];state.staff.splice(+el.dataset.delStaff,1);saveState();render()})}
function renderSchedule(){const staff=activeStaff(),empOptions=staff.map(s=>s.name);if(!scheduleFilterEmployee||!empOptions.includes(scheduleFilterEmployee))scheduleFilterEmployee=empOptions[0]||"";const selected=staff.find(s=>s.name===scheduleFilterEmployee),locOptions=["",...locationsList()],days=selected?ensureSchedule(selected.name):[],visibleDays=days.map((d,di)=>({d,di})).filter(x=>!scheduleFilterLocation||x.d.location===scheduleFilterLocation);const card=selected?`<div class="panel employee-card"><h3>${esc(selected.name)} <span class="status-pill">${esc(selected.role||"")}</span></h3><p class="mobile-card-note">Editing one employee at a time keeps the schedule usable on phones.</p><table class="schedule-table"><thead><tr><th>Day</th><th>Location</th><th>Start</th><th>End</th><th>Status</th><th>Notes</th><th>Undo</th></tr></thead><tbody>${visibleDays.map(({d,di})=>`<tr class="schedule-row ${dayClass(d)}" style="--row-color:${esc(locationColor(d.location))}"><td data-label="Day"><strong>${dayForIndex(di)}</strong><br><small>${mdy(d.date)}</small></td><td data-label="Location">${select(d.location,["",...locationsList()],`data-sch-name="${esc(selected.name)}" data-day="${di}" data-field="location" ${d.status==="Off"?"disabled":""}`)}</td><td data-label="Start"><input type="time" value="${esc(d.start||"")}" data-sch-name="${esc(selected.name)}" data-day="${di}" data-field="start" ${d.status==="Off"?"disabled":""}></td><td data-label="End"><input type="time" value="${esc(d.end||"")}" data-sch-name="${esc(selected.name)}" data-day="${di}" data-field="end" ${d.status==="Off"?"disabled":""}></td><td data-label="Status">${select(d.status,STATUS,`data-sch-name="${esc(selected.name)}" data-day="${di}" data-field="status"`)}</td><td data-label="Notes">${input(d.notes,`data-sch-name="${esc(selected.name)}" data-day="${di}" data-field="notes" ${d.status==="Off"?"disabled":""}`)}</td><td data-label="Undo">${lineUndo[lineKey(selected.name,di)]?`<button class="secondary inline-undo" data-line-undo="${lineKey(selected.name,di)}" data-name="${esc(selected.name)}" data-day="${di}">Undo Row</button>`:`<small class="notice">—</small>`}</td></tr>`).join("")||`<tr><td colspan="7">No days match this location filter.</td></tr>`}</tbody></table></div>`:`<div class="panel">Add an active employee first.</div>`;document.getElementById("schedule").innerHTML=`<div class="panel"><h2>Schedule Editor</h2><div class="compact-controls"><label>Employee ${select(scheduleFilterEmployee,empOptions,'id="scheduleEmployee"')}</label><label>Location Filter ${select(scheduleFilterLocation,locOptions,'id="scheduleLocation"')}</label><div class="row-actions"><button id="duplicateWeek">Duplicate Week +7 Days</button><button id="saveSnapshot">Save Snapshot Log</button><button class="secondary" id="fillDefaults">Normalize Off Days</button><button class="danger" id="clearSchedule">Clear All</button></div></div></div>${card}`;document.getElementById("scheduleEmployee").onchange=e=>{scheduleFilterEmployee=e.target.value;renderSchedule()};document.getElementById("scheduleLocation").onchange=e=>{scheduleFilterLocation=e.target.value;renderSchedule()};document.querySelectorAll("[data-sch-name]").forEach(el=>el.onchange=e=>{const name=el.dataset.schName,di=+el.dataset.day;const day=ensureSchedule(name)[di];pushLineUndo(name,di,day);pushUndo("Edit schedule");day[el.dataset.field]=e.target.value;if(el.dataset.field==="status"&&e.target.value==="Off")clearOffFields(day);else if(el.dataset.field==="status"&&e.target.value==="Scheduled")day.status="Scheduled";else if(el.dataset.field==="start")normalizeDay(day);saveState();render()});document.querySelectorAll("[data-line-undo]").forEach(btn=>btn.onclick=()=>restoreLineUndo(btn.dataset.name,+btn.dataset.day));document.getElementById("fillDefaults").onclick=()=>{pushUndo("Normalize schedule");activeStaff().forEach(s=>ensureSchedule(s.name).forEach(normalizeDay));saveState();render()};document.getElementById("clearSchedule").onclick=()=>{if(confirm("Clear all schedule entries?")){pushUndo("Clear schedule");activeStaff().forEach(s=>ensureSchedule(s.name).forEach((d,i)=>Object.assign(d,{date:dateAdd(state.startDate,i),day:DAYS3[i],location:"",start:"",end:"",status:"Off",notes:""})));lineUndo={};saveState();render()}};document.getElementById("duplicateWeek").onclick=duplicateWeek;document.getElementById("saveSnapshot").onclick=saveSnapshotLog}
function duplicateWeek(){if(!confirm("Duplicate current schedule pattern into next week and move start date forward 7 days?"))return;pushUndo("Duplicate week");state.startDate=dateAdd(state.startDate,7);activeStaff().forEach(s=>ensureSchedule(s.name).forEach((d,i)=>{d.date=dateAdd(state.startDate,i);d.day=DAYS3[i]}));saveState();render()}
function snapshotRows(){let rows=[];activeStaff().forEach(s=>ensureSchedule(s.name).forEach((d,i)=>rows.push({employee:s.name,day:dayForIndex(i),date:d.date,time:timeRange(d.start,d.end),status:d.status,location:d.location,notes:d.notes})));return rows}
function saveSnapshotLog(){pushUndo("Save snapshot");if(!state.logs)state.logs=[];state.logs.unshift({id:Date.now(),loggedAt:new Date().toISOString(),businessName:state.businessName,weekStarting:state.startDate,rows:snapshotRows(),text:buildAllText()});saveState();renderLog();alert("Snapshot saved.")}
function exportCSV(){let rows=[["Employee","Day","Date","Time","Status","Location","Notes"]];snapshotRows().forEach(r=>rows.push([r.employee,r.day,mdy(r.date),r.time,r.status,r.location,r.notes]));downloadBlob(rows.map(r=>r.map(x=>`"${String(x||"").replace(/"/g,'""')}"`).join(",")).join("\n"),"full_schedule.csv","text/csv")}
function exportWord(){downloadBlob(`<html><body><pre>${esc(buildAllText())}</pre></body></html>`,"full_schedule.doc","application/msword")}
function exportXls(){let html=`<html><body><table border="1"><tr><th>Employee</th><th>Day</th><th>Date</th><th>Time</th><th>Status</th><th>Location</th><th>Notes</th></tr>${snapshotRows().map(r=>`<tr><td>${esc(r.employee)}</td><td>${esc(r.day)}</td><td>${esc(mdy(r.date))}</td><td>${esc(r.time)}</td><td>${esc(r.status)}</td><td>${esc(r.location)}</td><td>${esc(r.notes)}</td></tr>`).join("")}</table></body></html>`;downloadBlob(html,"full_schedule.xls","application/vnd.ms-excel")}
async function copyAll(){await navigator.clipboard.writeText(buildAllText());alert("Copied full schedule.")}
function downloadBlob(text,name,type){const blob=new Blob([text],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
function renderExport(){const empOptions=["",...activeStaff().map(s=>s.name)],locOptions=["",...locationsList()],employeeFilter=document.getElementById("exportEmployee")?.value||"",locFilter=document.getElementById("exportLocation")?.value||"",people=activeStaff().filter(s=>!employeeFilter||s.name===employeeFilter);document.getElementById("export").innerHTML=`<h2>Export</h2><div class="panel subtle"><h3>Export Full Week - All Workers</h3><div class="row-actions"><button id="copyAll">Copy All</button><button id="exportCSV">Export CSV</button><button id="exportXLS">Export Excel</button><button id="exportWord">Export Word</button><button id="saveSnapshotExport">Save Snapshot Log</button></div></div><div class="grid cols-2"><label>Filter by Employee ${select(employeeFilter,empOptions,'id="exportEmployee"')}</label><label>Filter by Location ${select(locFilter,locOptions,'id="exportLocation"')}</label></div><p class="notice">Copy/paste is most reliable for full schedules. Email/SMS links use shortened URL-safe text.</p><div class="card-grid">${people.map(s=>{const txt=buildTextForEmployee(s,locFilter),body=encodedBody(txt);return`<div class="panel"><h3>${esc(firstName(s.name))}</h3><div class="export-block">${esc(txt)}</div><div class="row-actions" style="margin-top:10px"><button data-copy="${esc(s.name)}">Copy Text</button><a class="action" href="mailto:${encodeURIComponent(s.email)}?subject=Upcoming%20Shift&body=${body}">Email</a><a class="action" href="sms:${encodeURIComponent(s.phone)}?body=${body}">Text</a></div></div>`}).join("")}</div>`;document.getElementById("exportEmployee").onchange=renderExport;document.getElementById("exportLocation").onchange=renderExport;document.getElementById("copyAll").onclick=copyAll;document.getElementById("exportCSV").onclick=exportCSV;document.getElementById("exportXLS").onclick=exportXls;document.getElementById("exportWord").onclick=exportWord;document.getElementById("saveSnapshotExport").onclick=saveSnapshotLog;document.querySelectorAll("[data-copy]").forEach(btn=>btn.onclick=async()=>{const s=activeStaff().find(x=>x.name===btn.dataset.copy);await navigator.clipboard.writeText(buildTextForEmployee(s,document.getElementById("exportLocation").value));btn.textContent="Copied";setTimeout(()=>btn.textContent="Copy Text",1200)})}
function renderLog(){const logs=state.logs||[];document.getElementById("log").innerHTML=`<h2>Schedule Log</h2><div class="toolbar"><button id="saveLogNow">Save Current Snapshot</button><button id="exportLogCSV">Export Log CSV</button><button class="danger" id="clearLogs">Clear Logs</button></div><div class="log-list"><table><thead><tr><th>Saved</th><th>Week Starting</th><th>Rows</th><th>Actions</th></tr></thead><tbody>${logs.map((l,i)=>`<tr><td>${esc(new Date(l.loggedAt).toLocaleString())}</td><td>${esc(mdy(l.weekStarting))}</td><td>${l.rows?.length||0}</td><td><button data-log-copy="${i}">Copy</button></td></tr>`).join("")||`<tr><td colspan="4">No snapshots saved yet.</td></tr>`}</tbody></table></div>`;document.getElementById("saveLogNow").onclick=saveSnapshotLog;document.getElementById("clearLogs").onclick=()=>{if(confirm("Clear all saved logs?")){pushUndo("Clear logs");state.logs=[];saveState();renderLog()}};document.getElementById("exportLogCSV").onclick=()=>{let rows=[["Logged At","Week Starting","Employee","Day","Date","Time","Status","Location","Notes"]];(state.logs||[]).forEach(l=>(l.rows||[]).forEach(r=>rows.push([l.loggedAt,l.weekStarting,r.employee,r.day,mdy(r.date),r.time,r.status,r.location,r.notes])));downloadBlob(rows.map(r=>r.map(x=>`"${String(x||"").replace(/"/g,'""')}"`).join(",")).join("\n"),"schedule_log.csv","text/csv")};document.querySelectorAll("[data-log-copy]").forEach(btn=>btn.onclick=async()=>{await navigator.clipboard.writeText(logs[+btn.dataset.logCopy].text||"");btn.textContent="Copied"})}
function renderData(){document.getElementById("data").innerHTML=`<h2>Save / Load</h2><p class="notice">Autosave stores changes in this browser. Export JSON to move the schedule to another device.</p><div class="row-actions"><button id="downloadJson">Download JSON Backup</button><button id="saveFile">Save JSON File</button><label class="secondary" style="display:inline-flex;flex-direction:row;align-items:center;gap:8px">Import JSON <input type="file" id="importJson" accept="application/json" style="max-width:260px"></label><button class="danger" id="resetSeed">Reset Examples</button></div><h3>Raw Data</h3><textarea id="rawData" style="width:100%;min-height:280px">${esc(JSON.stringify(state,null,2))}</textarea><div class="row-actions" style="margin-top:10px"><button id="applyRaw">Apply Raw JSON</button></div>`;document.getElementById("downloadJson").onclick=()=>downloadBlob(JSON.stringify(state,null,2),"shift-scheduler-data.json","application/json");document.getElementById("saveFile").onclick=saveJsonFile;document.getElementById("importJson").onchange=e=>importJson(e.target.files[0]);document.getElementById("resetSeed").onclick=()=>{if(confirm("Reset all data to original examples?")){pushUndo("Reset examples");state=clone(SEED);saveState();render()}};document.getElementById("applyRaw").onclick=()=>{try{pushUndo("Apply raw JSON");state=JSON.parse(document.getElementById("rawData").value);if(!state.logs)state.logs=[];saveState();render()}catch(e){alert("Invalid JSON.")}}}
async function saveJsonFile(){const text=JSON.stringify(state,null,2);if(window.showSaveFilePicker){const handle=await showSaveFilePicker({suggestedName:"shift-scheduler-data.json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});const writable=await handle.createWritable();await writable.write(text);await writable.close();alert("Saved.")}else downloadBlob(text,"shift-scheduler-data.json","application/json")}
function importJson(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{pushUndo("Import JSON");state=JSON.parse(reader.result);if(!state.logs)state.logs=[];saveState();render()}catch(e){alert("Invalid JSON file.")}};reader.readAsText(file)}
function showTab(id){document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");render();window.scrollTo({top:0,behavior:"smooth"})}
document.querySelectorAll("nav button").forEach(btn=>btn.onclick=()=>showTab(btn.dataset.tab));render();
</script>
